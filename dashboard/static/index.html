<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SignalDesk Dashboard</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --surface: #12182b;
      --surface-2: #182138;
      --surface-3: #1d2945;
      --border: #283554;
      --text: #e8edf7;
      --muted: #95a3bf;
      --primary: #62d4c8;
      --primary-2: #2aa99b;
      --danger: #f87171;
      --warning: #fbbf24;
      --success: #34d399;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: linear-gradient(180deg, #08101d 0%, #0b1020 100%);
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
    }

    .app {
      max-width: 1440px;
      margin: 0 auto;
      padding: 28px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .brand h1 {
      margin: 0 0 8px;
      font-size: 34px;
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      max-width: 760px;
      line-height: 1.5;
    }

    .top-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .button {
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      padding: 11px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: 160ms ease;
    }

    .button:hover {
      background: var(--surface-3);
      border-color: #39507d;
    }

    .button.primary {
      background: linear-gradient(180deg, var(--primary) 0%, var(--primary-2) 100%);
      color: #07211e;
      border: none;
    }

    .statusline {
      color: var(--muted);
      font-size: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 22px;
    }

    .stat {
      background: rgba(18, 24, 43, 0.88);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .stat .label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .stat .value {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .layout {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: rgba(18, 24, 43, 0.9);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .sidebar {
      padding: 18px;
      position: sticky;
      top: 20px;
    }

    .sidebar h2,
    .content-head h2 {
      margin: 0 0 14px;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .field input,
    .field select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      outline: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--primary);
    }

    .sidebar-actions {
      display: flex;
      gap: 10px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .content {
      min-width: 0;
    }

    .content-head {
      padding: 18px;
      margin-bottom: 16px;
    }

    .content-head-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .content-head p {
      margin: 6px 0 0;
      color: var(--muted);
    }

    .results {
      display: grid;
      gap: 14px;
    }

    .card {
      padding: 18px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: rgba(19, 26, 45, 0.95);
      box-shadow: var(--shadow);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .card-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .card-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
    }

    .chip.priority-high {
      background: rgba(248, 113, 113, 0.12);
      color: #fca5a5;
      border-color: rgba(248, 113, 113, 0.25);
    }

    .chip.priority-medium {
      background: rgba(251, 191, 36, 0.12);
      color: #fcd34d;
      border-color: rgba(251, 191, 36, 0.25);
    }

    .chip.priority-low {
      background: rgba(52, 211, 153, 0.12);
      color: #6ee7b7;
      border-color: rgba(52, 211, 153, 0.25);
    }

    .chip.status-done {
      background: rgba(52, 211, 153, 0.12);
      color: #6ee7b7;
      border-color: rgba(52, 211, 153, 0.25);
    }

    .chip.status-error {
      background: rgba(248, 113, 113, 0.12);
      color: #fca5a5;
      border-color: rgba(248, 113, 113, 0.25);
    }

    .summary {
      margin: 14px 0;
      color: #d8dfec;
      line-height: 1.65;
    }

    .tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .tag {
      padding: 6px 10px;
      border-radius: 999px;
      background: #10192d;
      border: 1px solid #24324f;
      color: #a7b5d1;
      font-size: 12px;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .meta-line {
      color: var(--muted);
      font-size: 13px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .link {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }

    .link:hover {
      text-decoration: underline;
    }

    .empty,
    .loading,
    .error-box {
      padding: 28px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: rgba(18, 24, 43, 0.9);
      color: var(--muted);
    }

    .error-box {
      color: #fecaca;
      border-color: rgba(248, 113, 113, 0.25);
      background: rgba(127, 29, 29, 0.18);
    }

    @media (max-width: 1100px) {
      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
      }
    }

    @media (max-width: 700px) {
      .app {
        padding: 16px;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .brand h1 {
        font-size: 28px;
      }

      .card-title {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <h1>SignalDesk Dashboard</h1>
        <p>
          Live-Überblick über deine bereinigten Baserow-Signale mit Suche, Filtern,
          Priorisierung und direkter Verlinkung auf die Quellartikel.
        </p>
      </div>

      <div class="top-actions">
        <div class="statusline" id="statusLine">Lade Daten ...</div>
        <button class="button" id="resetBtn">Filter zurücksetzen</button>
        <button class="button primary" id="reloadBtn">Neu laden</button>
      </div>
    </header>

    <section class="stats">
      <div class="stat">
        <div class="label">Gesamtartikel</div>
        <div class="value" id="statTotal">0</div>
      </div>
      <div class="stat">
        <div class="label">High Priority</div>
        <div class="value" id="statHigh">0</div>
      </div>
      <div class="stat">
        <div class="label">Neue Einträge</div>
        <div class="value" id="statNew">0</div>
      </div>
      <div class="stat">
        <div class="label">Quellen aktiv</div>
        <div class="value" id="statSources">0</div>
      </div>
    </section>

    <section class="layout">
      <aside class="panel sidebar">
        <h2>Filter</h2>

        <div class="field">
          <label for="searchInput">Suche</label>
          <input id="searchInput" type="text" placeholder="Titel, Summary, Tags ..." />
        </div>

        <div class="field">
          <label for="sourceFilter">Quelle</label>
          <select id="sourceFilter">
            <option value="">Alle Quellen</option>
          </select>
        </div>

        <div class="field">
          <label for="categoryFilter">Kategorie</label>
          <select id="categoryFilter">
            <option value="">Alle Kategorien</option>
          </select>
        </div>

        <div class="field">
          <label for="priorityFilter">Priorität</label>
          <select id="priorityFilter">
            <option value="">Alle Prioritäten</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
        </div>

        <div class="field">
          <label for="statusFilter">Status</label>
          <select id="statusFilter">
            <option value="">Alle Status</option>
            <option value="done">Done</option>
            <option value="error">Error</option>
          </select>
        </div>

        <div class="sidebar-actions">
          <button class="button" id="applyBtn">Filter anwenden</button>
        </div>
      </aside>

      <main class="content">
        <section class="panel content-head">
          <div class="content-head-row">
            <div>
              <h2>Artikel</h2>
              <p id="resultInfo">Noch keine Daten geladen.</p>
            </div>
          </div>
        </section>

        <section class="results" id="results"></section>
      </main>
    </section>
  </div>

  <script>
    let allArticles = [];
    let meta = null;

    const els = {
      statusLine: document.getElementById("statusLine"),
      statTotal: document.getElementById("statTotal"),
      statHigh: document.getElementById("statHigh"),
      statNew: document.getElementById("statNew"),
      statSources: document.getElementById("statSources"),
      resultInfo: document.getElementById("resultInfo"),
      results: document.getElementById("results"),
      reloadBtn: document.getElementById("reloadBtn"),
      resetBtn: document.getElementById("resetBtn"),
      applyBtn: document.getElementById("applyBtn"),
      searchInput: document.getElementById("searchInput"),
      sourceFilter: document.getElementById("sourceFilter"),
      categoryFilter: document.getElementById("categoryFilter"),
      priorityFilter: document.getElementById("priorityFilter"),
      statusFilter: document.getElementById("statusFilter"),
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(value) {
      if (!value) return "Kein Datum";
      const date = new Date(value);
      if (!Number.isNaN(date.getTime())) {
        return new Intl.DateTimeFormat("de-DE", {
          year: "numeric",
          month: "short",
          day: "2-digit"
        }).format(date);
      }
      return value;
    }

    function normalizeText(value) {
      return String(value || "").toLowerCase().trim();
    }

    function uniqueSorted(values) {
      return [...new Set(values.filter(Boolean))].sort((a, b) => a.localeCompare(b));
    }

    function setSelectOptions(selectEl, values, placeholder) {
      const current = selectEl.value;
      selectEl.innerHTML = `<option value="">${placeholder}</option>`;
      values.forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        selectEl.appendChild(option);
      });
      selectEl.value = current;
    }

    function renderStats(items) {
      const high = items.filter(item => normalizeText(item.priority) === "high").length;
      const isNew = items.filter(item => item.is_new === true).length;
      const sources = new Set(items.map(item => item.source).filter(Boolean)).size;

      els.statTotal.textContent = String(meta?.total_rows ?? items.length ?? 0);
      els.statHigh.textContent = String(high);
      els.statNew.textContent = String(isNew);
      els.statSources.textContent = String(sources);
    }

    function getFilteredArticles() {
      const q = normalizeText(els.searchInput.value);
      const source = normalizeText(els.sourceFilter.value);
      const category = normalizeText(els.categoryFilter.value);
      const priority = normalizeText(els.priorityFilter.value);
      const status = normalizeText(els.statusFilter.value);

      return allArticles.filter(item => {
        const haystack = [
          item.dashboard_title,
          item.title,
          item.summary,
          item.source,
          item.category,
          item.language,
          ...(Array.isArray(item.tags) ? item.tags : [])
        ].join(" ").toLowerCase();

        const matchSearch = !q || haystack.includes(q);
        const matchSource = !source || normalizeText(item.source) === source;
        const matchCategory = !category || normalizeText(item.category) === category;
        const matchPriority = !priority || normalizeText(item.priority) === priority;
        const matchStatus = !status || normalizeText(item.status) === status;

        return matchSearch && matchSource && matchCategory && matchPriority && matchStatus;
      });
    }

    function renderCards(items) {
      if (!items.length) {
        els.results.innerHTML = `
          <div class="empty">
            Keine Treffer für die aktuelle Filterkombination gefunden.
          </div>
        `;
        return;
      }

      els.results.innerHTML = items.map(item => {
        const tags = Array.isArray(item.tags) ? item.tags : [];
        const priorityClass = `priority-${normalizeText(item.priority) || "none"}`;
        const statusClass = `status-${normalizeText(item.status) || "none"}`;

        return `
          <article class="card">
            <div class="card-top">
              <div>
                <h3 class="card-title">${escapeHtml(item.dashboard_title || item.title || "Ohne Titel")}</h3>
                <div class="card-meta">
                  ${item.source ? `<span class="chip">${escapeHtml(item.source)}</span>` : ""}
                  ${item.category ? `<span class="chip">${escapeHtml(item.category)}</span>` : ""}
                  ${item.language ? `<span class="chip">${escapeHtml(item.language)}</span>` : ""}
                  ${item.priority ? `<span class="chip ${priorityClass}">${escapeHtml(item.priority)}</span>` : ""}
                  ${item.status ? `<span class="chip ${statusClass}">${escapeHtml(item.status)}</span>` : ""}
                  ${item.relevance_score !== null && item.relevance_score !== undefined ? `<span class="chip">Score ${escapeHtml(item.relevance_score)}</span>` : ""}
                </div>
              </div>
            </div>

            <p class="summary">${escapeHtml(item.summary || "Keine Zusammenfassung vorhanden.")}</p>

            ${tags.length ? `
              <div class="tags">
                ${tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}
              </div>
            ` : ""}

            <div class="card-footer">
              <div class="meta-line">
                <span>${escapeHtml(formatDate(item.date))}</span>
                ${item.is_new ? `<span>Neu</span>` : ""}
                ${item.id ? `<span>ID ${escapeHtml(item.id)}</span>` : ""}
              </div>
              ${item.url ? `<a class="link" href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer">Quelle öffnen</a>` : ""}
            </div>
          </article>
        `;
      }).join("");
    }

    function render() {
      const filtered = getFilteredArticles();
      renderStats(allArticles);
      renderCards(filtered);

      const total = allArticles.length;
      const visible = filtered.length;
      const exportedAt = meta?.exported_at ? formatDate(meta.exported_at) : "unbekannt";

      els.resultInfo.textContent = `${visible} von ${total} Artikeln sichtbar · Letzter Export: ${exportedAt}`;
    }

    function populateFilters(items) {
      setSelectOptions(els.sourceFilter, uniqueSorted(items.map(item => item.source)), "Alle Quellen");
      setSelectOptions(els.categoryFilter, uniqueSorted(items.map(item => item.category)), "Alle Kategorien");
    }

    async function loadData() {
      els.statusLine.textContent = "Lade Daten ...";
      els.results.innerHTML = `<div class="loading">Daten werden geladen ...</div>`;

      try {
        const response = await fetch("/api/articles");

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        meta = data.meta || null;
        allArticles = Array.isArray(data.results) ? data.results : [];

        populateFilters(allArticles);
        render();

        const count = meta?.total_rows ?? allArticles.length;
        els.statusLine.textContent = `Verbunden · ${count} Einträge geladen`;
      } catch (error) {
        els.statusLine.textContent = "Fehler beim Laden";
        els.results.innerHTML = `
          <div class="error-box">
            Fehler beim Laden von <strong>/api/articles</strong><br />
            ${escapeHtml(error.message)}
          </div>
        `;
      }
    }

    function resetFilters() {
      els.searchInput.value = "";
      els.sourceFilter.value = "";
      els.categoryFilter.value = "";
      els.priorityFilter.value = "";
      els.statusFilter.value = "";
      render();
    }

    els.reloadBtn.addEventListener("click", loadData);
    els.resetBtn.addEventListener("click", resetFilters);
    els.applyBtn.addEventListener("click", render);
    els.searchInput.addEventListener("input", render);
    els.sourceFilter.addEventListener("change", render);
    els.categoryFilter.addEventListener("change", render);
    els.priorityFilter.addEventListener("change", render);
    els.statusFilter.addEventListener("change", render);

    loadData();
  </script>
</body>
</html>
